    <link rel="stylesheet" href="css/main.css">
    
</head>
<body>
    <section class="top-bar"><p>Snelle en betrouwbare levering</p></section>
    <header>
        <section class="icon-n-menu">
            <a href="index.html"><img src="media/images/Duurzaamheid-icon.png" width="70px" height="70px"></a>
            <div class="dropdown">
                <button class="dropdown-toggle"><p class="menu quicksand-title">Menu</p><span class="hamburger material-symbols-rounded">menu</span></button>
                <div class="dropdown-menu">
                    <a href="detailpagina.html">Detailpagina</a>
                    <a href="winkelmand.html">Winkelmand</a>
                </div>
            </div>
        </section>
        <a href="winkelmand.html" class="winkelmandknop"><span class="material-symbols-outlined">shopping_cart</span></a>
    </header>
    <main>
        <section class="winkelmand">
            <section class="bestelling">in deze sectie laad ik een lijst van producten in die in de winkelmand zijn gezet</section>
            <section class="bestelinfo">in deze sectie staat het totaalbedrag, een formulier om gegevens in te vullen en een bestelknop<br><section class="formulier-container">
                <h2>Bestelformulier</h2>
                <form action="#" method="post" class="bestel-formulier">
                    <label for="naam">Naam</label>
                    <input type="text" id="naam" name="naam" required>
            
                    <label for="email">E-mailadres</label>
                    <input type="email" id="email" name="email" required>
            
                    <label for="product">Productnaam</label>
                    <input type="text" id="product" name="product" required>  
                    <!-- voeg requirement toe waar het een bestaand product moet zijn -->
            
                    <label for="adres">Adres</label>
                    <textarea id="adres" name="adres" rows="3" required></textarea>
            
                    <button type="submit">Bestel</button>
                </form>
            </section></section>
        </section>
    </main>
</body>
</html>
